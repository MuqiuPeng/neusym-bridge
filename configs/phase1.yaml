# Phase 1: Common structure detection
data:
  grid_size: 32
  dt: 0.01
  n_steps: 100
  n_trajectories: 1000
  alpha_choices: [0.05, 0.1, 0.2]
  seed: 42

model:
  latent_dim: 32

training:
  n_epochs: 50
  batch_size: 256
  lr: 1.0e-3
  val_split: 0.1
  reg_weight: 0.01

seeds: [42, 137, 999]

thresholds:
  cka_min: 0.7
  effective_rank_cv_max: 0.2
  procrustes_residual_max: 0.2
  random_baseline_multiplier: 5

controls:
  overfit_epochs: 200
  noise_trajectories: 200
